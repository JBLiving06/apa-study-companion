function playAudio(url, fallbackText) {
  return new Promise((resolve, reject) => {
    const a = new Audio(url);
    a.play().then(()=>{
      a.onended = resolve;
    }).catch(()=>{
      if (fallbackText && window.speechSynthesis) {
        const u = new SpeechSynthesisUtterance(fallbackText);
        u.onend = resolve;
        u.onerror = reject;
        window.speechSynthesis.speak(u);
      } else { reject(); }
    });
  });
}

function compareWords(expected, actual) {
  const norm = s => s.toLowerCase().replace(/[^a-z0-9\s]/g, '').split(/\s+/).filter(Boolean);
  const expW = norm(expected);
  const actW = norm(actual);
  let result = [];
  let ai = 0;
  let matched = 0;
  for (let ei = 0; ei < expW.length; ei++) {
    let found = false;
    for (let look = 0; look < 3 && ai + look < actW.length; look++) {
      if (actW[ai + look] === expW[ei]) {
        for (let skip = 0; skip < look; skip++) {
          result.push({ word: actW[ai + skip], match: false });
        }
        result.push({ word: expW[ei], match: true });
        ai = ai + look + 1;
        matched++;
        found = true;
        break;
      }
    }
    if (!found) {
      result.push({ word: expW[ei], match: false });
    }
  }
  const total = expW.length;
  const pct = total === 0 ? 0 : Math.round((matched / total) * 100);
  return { result, pct, matched, total };
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─── HOOKS ─────────────────────────────────────────────────────────────────
function useSpeechRecognition() {
  const [transcript, setTranscript] = useState("");
  const [listening, setListening] = useState(false);
  const recRef = useRef(null);
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const supported = !!SR;

  const start = useCallback(() => {
    if (!SR) return;
    const r = new SR();
    r.continuous = true;
    r.interimResults = true;
    r.lang = "en-US";
    let finalT = "";
    r.onresult = (e) => {
      let interim = "";
      for (let i = 0; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalT += e.results[i][0].transcript + " ";
        else interim += e.results[i][0].transcript;
      }
      setTranscript(finalT + interim);
    };
    r.onerror = () => setListening(false);
    r.onend = () => setListening(false);
    recRef.current = r;
    r.start();
    setListening(true);
    setTranscript("");
  }, [SR]);

  const stop = useCallback(() => {
    if (recRef.current) { recRef.current.stop(); }
    setListening(false);
  }, []);

  const reset = useCallback(() => { setTranscript(""); }, []);

  return { transcript, listening, supported, start, stop, reset };
}

function useAudioRecorder() {
  const [recording, setRecording] = useState(false);
  const [audioURL, setAudioURL] = useState(null);
  const mediaRef = useRef(null);
  const chunksRef = useRef([]);
  const [supported, setSupported] = useState(true);

  useEffect(() => {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) setSupported(false);
  }, []);

  const startRec = useCallback(async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mr = new MediaRecorder(stream);
      chunksRef.current = [];
      mr.ondataavailable = (e) => { if (e.data.size > 0) chunksRef.current.push(e.data); };
      mr.onstop = () => {
        const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
        setAudioURL(URL.createObjectURL(blob));
        stream.getTracks().forEach(t => t.stop());
      };
      mediaRef.current = mr;
      mr.start();
      setRecording(true);
    } catch { setSupported(false); }
  }, []);

  const stopRec = useCallback(() => {
    if (mediaRef.current && mediaRef.current.state !== 'inactive') {
      mediaRef.current.stop();
    }
    setRecording(false);
  }, []);

  const clearRec = useCallback(() => { setAudioURL(null); }, []);

  return { recording, audioURL, supported, startRec, stopRec, clearRec };
}

const initState = {
  showWelcome: true,
  tab: 0,
  category: "Founders and Seven Jewels",
  studyMode: "flashcard",
  cardIndex: 0,
  flipped: false,
  quizIndex: 0,
  quizAnswered: false,
  quizSelected: null,
  quizScores: {},
  selectedPoem: null,
  poemMode: null,
  poemProgress: {},
  greekOral: false,
  greekOralIndex: 0,
  greekOralResults: [],
  greekOralDone: false,
  showMnemonic: false,
};

function reducer(state, action) {
  switch (action.type) {
    case "ENTER": return { ...state, showWelcome: false };
    case "SET_TAB": return { ...state, tab: action.val, greekOral: false };
    case "SET_CATEGORY": return { ...state, category: action.val, cardIndex: 0, flipped: false, quizIndex: 0, quizAnswered: false, quizSelected: null, studyMode: (action.val !== "First Chapters Founded" && state.studyMode === "timeline") ? "flashcard" : state.studyMode };
    case "SET_STUDY_MODE": return { ...state, studyMode: action.val, cardIndex: 0, flipped: false, quizIndex: 0, quizAnswered: false, quizSelected: null };
    case "FLIP": return { ...state, flipped: !state.flipped };
    case "NEXT_CARD": {
      const cards = CATEGORIES[state.category];
      return { ...state, cardIndex: (state.cardIndex + 1) % cards.length, flipped: false };
    }
    case "PREV_CARD": {
      const cards2 = CATEGORIES[state.category];
      return { ...state, cardIndex: (state.cardIndex - 1 + cards2.length) % cards2.length, flipped: false };
    }
    case "QUIZ_SELECT": return { ...state, quizSelected: action.val, quizAnswered: true };
    case "QUIZ_NEXT": {
      const cards3 = CATEGORIES[state.category];
      if (state.quizIndex + 1 >= cards3.length) return { ...state, quizIndex: 0, quizAnswered: false, quizSelected: null };
      return { ...state, quizIndex: state.quizIndex + 1, quizAnswered: false, quizSelected: null };
    }
    case "QUIZ_SCORE": {
      const key = state.category;
      const prev = state.quizScores[key] || { correct: 0, total: 0 };
      return { ...state, quizScores: { ...state.quizScores, [key]: { correct: prev.correct + (action.correct ? 1 : 0), total: prev.total + 1 } } };
    }
    case "SELECT_POEM": return { ...state, selectedPoem: action.val, poemMode: null };
    case "SET_POEM_MODE": return { ...state, poemMode: action.val };
    case "BACK_POEMS": return { ...state, selectedPoem: null, poemMode: null };
    case "BACK_POEM_MODES": return { ...state, poemMode: null };
    case "MARK_POEM_DONE": {
      const k = `${action.poem}_${action.mode}`;
      return { ...state, poemProgress: { ...state.poemProgress, [k]: true } };
    }
    case "START_GREEK_ORAL": return { ...state, greekOral: true, greekOralIndex: 0, greekOralResults: [], greekOralDone: false, showMnemonic: false };
    case "GREEK_ORAL_RESULT": {
      const res = [...state.greekOralResults, action.val];
      const nextIdx = state.greekOralIndex + 1;
      if (nextIdx >= 24) return { ...state, greekOralResults: res, greekOralDone: true };
      return { ...state, greekOralResults: res, greekOralIndex: nextIdx };
    }
    case "GREEK_ORAL_RETRY": return { ...state, greekOralIndex: 0, greekOralResults: [], greekOralDone: false };
    case "EXIT_GREEK_ORAL": return { ...state, greekOral: false };
    case "TOGGLE_MNEMONIC": return { ...state, showMnemonic: !state.showMnemonic };
    default: return state;
  }
}

function Flashcard({ card, flipped, onFlip, onPrev, onNext, index, total, isGreek }) {

  useEffect(() => {
    if (flipped && !prevFlipped.current && isGreek && card.audioFile) {

    prevFlipped.current = flipped;
  }, [flipped, card, isGreek]);

  return (

// ─── QUIZ ──────────────────────────────────────────────────────────────────
function Quiz({ cards, quizIndex, quizAnswered, quizSelected, dispatch, category }) {
  const card = cards[quizIndex];
  const options = useMemo(() => {
    const wrong = cards.filter((_, i) => i !== quizIndex).map(c => c.a);
    const picked = shuffle(wrong).slice(0, 3);
    return shuffle([card.a, ...picked]);
  }, [quizIndex, cards, card.a]);

  const handleSelect = (opt) => {
    if (quizAnswered) return;
    dispatch({ type: "QUIZ_SELECT", val: opt });
    dispatch({ type: "QUIZ_SCORE", correct: opt === card.a });
  };

  return (
    <div>
      <div style={{ background: '#1a1a1a', border: '2px solid #C4911F', borderRadius: 12, padding: 20, marginBottom: 16, minHeight: 80, display: 'flex', alignItems: 'center', justifyContent: 'center', textAlign: 'center' }}>
        <span style={{ color: '#C4911F', fontSize: 16 }}>{card.q}</span>
      </div>
      <div style={{ color: '#999', fontSize: 13, textAlign: 'center', marginBottom: 12 }}>Question {quizIndex + 1} of {cards.length}</div>
      {options.map((opt, i) => {
        let cls = "quiz-opt";
        if (quizAnswered) {
          if (opt === card.a) cls += " correct";
          else if (opt === quizSelected) cls += " wrong";
        }
        return <button key={i} className={cls} onClick={() => handleSelect(opt)}>{opt}</button>;
      })}
      {quizAnswered && (
        <button onClick={() => dispatch({ type: "QUIZ_NEXT" })} className="bg-gold" style={{ width: '100%', padding: 12, borderRadius: 8, border: 'none', fontWeight: 700, marginTop: 12, cursor: 'pointer', color: '#000' }}>
          {quizIndex + 1 >= cards.length ? "Restart Quiz" : "Next Question"}
        </button>
      )}
    </div>
  );
}

// ─── GREEK ORAL PRACTICE ───────────────────────────────────────────────────
function GreekOralPractice({ state, dispatch }) {
  const { greekOralIndex, greekOralResults, greekOralDone, showMnemonic } = state;
  const letter = GREEK_LETTERS[greekOralIndex];
  const sr = useSpeechRecognition();
  const [heard, setHeard] = useState("");
  const [result, setResult] = useState(null);

  const handleHear = () => {
    playAudio(`audio/greek_${letter.name.toLowerCase()}.mp3`, letter.name);
  };

  const handleSay = () => {
    if (sr.listening) {
      sr.stop();
      setTimeout(() => {
        const t = sr.transcript.trim().toLowerCase();
        setHeard(t);
        const nameL = letter.name.toLowerCase();
        const pronL = letter.pron.toLowerCase().replace(/-/g, '');
        const tClean = t.replace(/[^a-z]/g, '');
        const match = tClean.includes(nameL) || tClean.includes(pronL) || nameL.includes(tClean) || pronL.includes(tClean.replace(/\s/g,''));
        setResult(match);
      }, 500);
    } else {
      setHeard("");
      setResult(null);
      sr.reset();
      sr.start();
    }
  };

  const handleNext = () => {
    dispatch({ type: "GREEK_ORAL_RESULT", val: result === true });
    setHeard("");
    setResult(null);
    sr.reset();
  };

  if (greekOralDone) {
    const correct = greekOralResults.filter(Boolean).length;
    return (
      <div>
        <button onClick={() => dispatch({ type: "EXIT_GREEK_ORAL" })} style={{ background: 'none', border: 'none', color: '#C4911F', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4, marginBottom: 16 }}><BackArrow/> Back</button>
        <div style={{ textAlign: 'center', color: '#C4911F', fontSize: 22, fontWeight: 700, marginBottom: 16 }}>Scorecard: {correct}/24</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8 }}>
          {GREEK_LETTERS.map((g, i) => (
            <div key={i} style={{ background: '#1a1a1a', borderRadius: 8, padding: 8, textAlign: 'center', border: `1px solid ${greekOralResults[i] ? '#22c55e' : '#ef4444'}` }}>
              <div style={{ color: '#fff', fontSize: 13, fontWeight: 600 }}>{g.name}</div>
              <div style={{ marginTop: 4 }}>{greekOralResults[i] ? <CheckIcon/> : <XIcon/>}</div>
            </div>
          ))}
        </div>
        <div style={{ display: 'flex', gap: 12, marginTop: 20 }}>
          <button onClick={() => dispatch({ type: "GREEK_ORAL_RETRY" })} style={{ flex: 1, padding: 12, borderRadius: 8, border: '1px solid #C4911F', background: 'none', color: '#C4911F', fontWeight: 600, cursor: 'pointer' }}>Retry</button>
          <button onClick={() => dispatch({ type: "EXIT_GREEK_ORAL" })} className="bg-gold" style={{ flex: 1, padding: 12, borderRadius: 8, border: 'none', color: '#000', fontWeight: 700, cursor: 'pointer' }}>Done</button>
        </div>
      </div>
    );
  }

  return (
    <div>
      <button onClick={() => dispatch({ type: "EXIT_GREEK_ORAL" })} style={{ background: 'none', border: 'none', color: '#C4911F', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4, marginBottom: 12 }}><BackArrow/> Back</button>
      <div style={{ textAlign: 'center', color: '#999', fontSize: 14, marginBottom: 8 }}>Letter {greekOralIndex + 1} of 24</div>
      <div style={{ textAlign: 'center', marginBottom: 16 }}>
        <div style={{ fontSize: 36, color: '#C4911F', fontWeight: 700 }}>{letter.name}</div>
        <div style={{ color: '#ccc', fontSize: 16 }}>({letter.pron})</div>
      </div>
      <div style={{ display: 'flex', gap: 12, marginBottom: 16 }}>
        <button onClick={handleHear} style={{ flex: 1, padding: 12, borderRadius: 8, border: '1px solid #C4911F', background: 'none', color: '#C4911F', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
          <SpeakerIcon size={18}/> Hear Pronunciation
        </button>
        <button onClick={handleSay} className={sr.listening ? 'mic-pulse' : ''} style={{ flex: 1, padding: 12, borderRadius: 8, border: 'none', background: sr.listening ? '#ef4444' : '#C4911F', color: sr.listening ? '#fff' : '#000', fontWeight: 700, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
          <MicIcon size={18}/> {sr.listening ? "Stop" : "Say It"}
        </button>
      </div>
      {heard && (
        <div style={{ background: '#1a1a1a', borderRadius: 8, padding: 12, marginBottom: 12 }}>
          <div style={{ color: '#999', fontSize: 12 }}>You said:</div>
          <div style={{ color: '#fff', fontSize: 16 }}>{heard}</div>
          <div style={{ marginTop: 8, color: result ? '#22c55e' : '#ef4444', fontWeight: 600 }}>{result ? "Correct!" : "Try again or continue"}</div>
        </div>
      )}
      {(result !== null) && (
        <button onClick={handleNext} className="bg-gold" style={{ width: '100%', padding: 12, borderRadius: 8, border: 'none', fontWeight: 700, cursor: 'pointer', color: '#000' }}>
          Next Letter
        </button>
      )}
      <button onClick={() => dispatch({ type: "TOGGLE_MNEMONIC" })} style={{ width: '100%', marginTop: 12, padding: 10, borderRadius: 8, border: '1px solid #333', background: 'none', color: '#999', cursor: 'pointer', fontSize: 13 }}>
        {showMnemonic ? "Hide" : "Show"} Mnemonic Song
      </button>
      {showMnemonic && (
        <div style={{ marginTop: 12, borderRadius: 8, overflow: 'hidden' }}>
          <iframe width="100%" height="200" src="https://www.youtube.com/embed/w3D5ERMOpMk" frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen></iframe>
        </div>
      )}
    </div>
  );
}

// ─── CHAPTER TIMELINE ──────────────────────────────────────────────────────
function ChapterTimeline() {
  const [animIdx, setAnimIdx] = useState(-1);
  const [playing, setPlaying] = useState(false);
  const [showAll, setShowAll] = useState(false);
  const timerRef = useRef(null);

  const parseDate = (dateStr) => {
    const parts = dateStr.split('/');
    return new Date(parseInt(parts[2]) < 100 ? parseInt(parts[2]) + 1900 : parseInt(parts[2]), parseInt(parts[0]) - 1, parseInt(parts[1]));
  };

  const sorted = useMemo(() => {
    return CHAPTERS_DATA.map((c, i) => ({ ...c, origIdx: i, parsed: parseDate(c.date) }))
      .sort((a, b) => a.parsed - b.parsed);
  }, []);

  const startAnimation = () => {
    setShowAll(false);
    setAnimIdx(0);
    setPlaying(true);
  };

  useEffect(() => {
    if (playing && animIdx >= 0 && animIdx < sorted.length) {
      timerRef.current = setTimeout(() => {
        if (animIdx + 1 < sorted.length) {
          setAnimIdx(animIdx + 1);
        } else {
          setPlaying(false);
          setShowAll(true);
        }
      }, 1200);
    }
    return () => { if (timerRef.current) clearTimeout(timerRef.current); };
  }, [playing, animIdx, sorted.length]);

  const stopAnimation = () => {
    setPlaying(false);
    setShowAll(true);
    setAnimIdx(sorted.length - 1);
    if (timerRef.current) clearTimeout(timerRef.current);
  };

  const visibleCount = showAll ? sorted.length : (animIdx >= 0 ? animIdx + 1 : 0);

  const years = [...new Set(sorted.map(c => c.parsed.getFullYear()))].sort();

  return (
    <div>
      <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
        {!playing ? (
          <button onClick={startAnimation} className="bg-gold" style={{ flex: 1, padding: 10, borderRadius: 8, border: 'none', fontWeight: 700, cursor: 'pointer', color: '#000', fontSize: 13 }}>
            {animIdx < 0 ? "Play Timeline" : "Replay"}
          </button>
        ) : (
          <button onClick={stopAnimation} style={{ flex: 1, padding: 10, borderRadius: 8, border: 'none', background: '#ef4444', fontWeight: 700, cursor: 'pointer', color: '#fff', fontSize: 13 }}>
            Show All
          </button>
        )}
      </div>

      <div style={{ position: 'relative', paddingLeft: 20 }}>
        {/* Vertical timeline line */}
        <div style={{ position: 'absolute', left: 8, top: 0, bottom: 0, width: 2, background: '#333' }} />

        {years.map(year => {
          const yearChapters = sorted.filter(c => c.parsed.getFullYear() === year);
          const yearVisible = yearChapters.filter((_, yi) => {
            const globalIdx = sorted.indexOf(yearChapters[yi]);
            return globalIdx < visibleCount;
          });
          if (yearVisible.length === 0) return null;

          return (
            <div key={year} style={{ marginBottom: 16 }}>
              <div style={{ color: '#C4911F', fontSize: 14, fontWeight: 800, marginBottom: 8, marginLeft: 12 }}>{year}</div>
              {yearChapters.map((ch, ci) => {
                const globalIdx = sorted.indexOf(ch);
                const visible = globalIdx < visibleCount;
                if (!visible) return null;
                const isNew = playing && globalIdx === animIdx;

                return (
                  <div key={ci} style={{
                    display: 'flex', alignItems: 'flex-start', marginBottom: 8, marginLeft: 4,
                    opacity: isNew ? 1 : (playing ? 0.7 : 1),
                    transition: 'opacity 0.3s',
                  }}>
                    <div style={{
                      width: 10, height: 10, borderRadius: '50%',
                      background: isNew ? '#C4911F' : '#666',
                      border: isNew ? '2px solid #C4911F' : '2px solid #444',
                      marginRight: 10, marginTop: 4, flexShrink: 0,
                      boxShadow: isNew ? '0 0 8px #C4911F' : 'none',
                      transition: 'all 0.3s',
                    }} />
                    <div style={{
                      background: isNew ? '#1a1a0a' : '#1a1a1a',
                      border: isNew ? '1px solid #C4911F' : '1px solid #333',
                      borderRadius: 8, padding: '8px 12px', flex: 1,
                      transition: 'all 0.3s',
                    }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <span style={{ color: '#C4911F', fontWeight: 700, fontSize: 14 }}>{ch.name}</span>
                        <span style={{ color: '#888', fontSize: 11 }}>{ch.date}</span>
                      </div>
                      <div style={{ color: '#ccc', fontSize: 12, marginTop: 2 }}>{ch.loc}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── POEM PRACTICE MODES ───────────────────────────────────────────────────
function GuidedRecitation({ poem, dispatch }) {
  const [stanzaIdx, setStanzaIdx] = useState(0);
  const [round, setRound] = useState(1);
  const [phase, setPhase] = useState("ready");
  const sr = useSpeechRecognition();
  const [result, setResult] = useState(null);
  const [stanzaResults, setStanzaResults] = useState([]);
  const totalStanzas = poem.stanzas.length;
  const stanza = poem.stanzas[stanzaIdx];
  const stanzaText = stanza ? stanza.join(" ") : "";
  const allDone = stanzaIdx >= totalStanzas;

  const poemKey = poem.title === "Invictus" ? "invictus" : poem.title === "The Test of a Man" ? "test_of_a_man" : "house_of_alpha";
  const stanzaAudioFile = `audio/stanza_${poemKey}_${stanzaIdx}.mp3`;

  const speakStanza = () => {
    setPhase("playing");
    playAudio(stanzaAudioFile, stanzaText).then(() => setPhase("spoken")).catch(() => setPhase("spoken"));
  };

  const advanceRound = () => {
    if (round < 3) {
      setRound(round + 1);
      setPhase("ready");
    } else if (round === 3) {
      setRound(4);
      setPhase("ready");
      setResult(null);
    } else {
      // round 4 done, move to next stanza
      setStanzaResults(prev => [...prev, result ? result.pct : 0]);
      if (stanzaIdx + 1 < totalStanzas) {
        setStanzaIdx(stanzaIdx + 1);
        setRound(1);
        setPhase("ready");
        setResult(null);
      } else {
        setStanzaIdx(totalStanzas); // triggers allDone
      }
    }
  };

  const startReciting = () => {
    sr.reset();
    sr.start();
    setPhase("reciting");
    setResult(null);
  };

  const stopReciting = () => {
    sr.stop();
    setPhase("scoring");
    setTimeout(() => {
      const res = compareWords(stanzaText, sr.transcript);
      setResult(res);
      setPhase("scored");
    }, 600);
  };

  if (allDone) {
    const avgPct = stanzaResults.length > 0 ? Math.round(stanzaResults.reduce((a,b)=>a+b,0) / stanzaResults.length) : 0;
    if (avgPct >= 50) dispatch({ type: "MARK_POEM_DONE", poem: poem.title, mode: 0 });
    return (
      <div>
        <div style={{ color: '#C4911F', fontSize: 18, fontWeight: 700, textAlign: 'center', marginBottom: 16 }}>{poem.title} — Complete!</div>
        <div style={{ background: avgPct >= 70 ? '#166534' : avgPct >= 40 ? '#854d0e' : '#7f1d1d', borderRadius: 12, padding: 20, textAlign: 'center', marginBottom: 16 }}>
          <div style={{ color: '#fff', fontSize: 32, fontWeight: 800 }}>{avgPct}%</div>
          <div style={{ color: '#ccc', fontSize: 13, marginTop: 4 }}>Average recall accuracy</div>
        </div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, justifyContent: 'center', marginBottom: 16 }}>
          {stanzaResults.map((pct, i) => (
            <div key={i} style={{ background: '#1a1a1a', borderRadius: 8, padding: '8px 12px', textAlign: 'center', border: `1px solid ${pct >= 60 ? '#22c55e' : '#ef4444'}` }}>
              <div style={{ color: '#999', fontSize: 11 }}>Stanza {i+1}</div>
              <div style={{ color: pct >= 60 ? '#22c55e' : '#ef4444', fontWeight: 700, fontSize: 16 }}>{pct}%</div>
            </div>
          ))}
        </div>
        <button onClick={() => { setStanzaIdx(0); setRound(1); setPhase("ready"); setResult(null); setStanzaResults([]); }} className="bg-gold" style={{ width: '100%', padding: 12, borderRadius: 8, border: 'none', fontWeight: 700, cursor: 'pointer', color: '#000' }}>
          Try Again
        </button>
      </div>
    );
  }

  const isScaffolded = round <= 3;

  return (
    <div>
      <div style={{ color: '#C4911F', fontSize: 18, fontWeight: 700, textAlign: 'center', marginBottom: 8 }}>{poem.title}</div>
      <div style={{ display: 'flex', justifyContent: 'center', gap: 16, marginBottom: 16 }}>
        <span style={{ color: '#999', fontSize: 12 }}>Stanza {stanzaIdx + 1} of {totalStanzas}</span>
        <span style={{ color: '#C4911F', fontSize: 12, fontWeight: 700 }}>Round {round} of 4</span>
      </div>

      {/* Round indicator */}
      <div style={{ display: 'flex', gap: 4, marginBottom: 16, justifyContent: 'center' }}>
        {[1,2,3,4].map(r => (
          <div key={r} style={{ width: 40, height: 6, borderRadius: 3, background: r < round ? '#C4911F' : r === round ? '#C4911F' : '#333', opacity: r <= round ? 1 : 0.4 }} />
        ))}
      </div>

      {/* Round label */}
      <div style={{ textAlign: 'center', marginBottom: 12 }}>
        {isScaffolded ? (
          <span style={{ color: '#C4911F', fontSize: 13, fontWeight: 600 }}>Hear it &amp; see it, then repeat</span>
        ) : (
          <span style={{ color: '#ef4444', fontSize: 13, fontWeight: 600 }}>From memory — no text, no audio</span>
        )}
      </div>

      {/* Stanza text (shown only in rounds 1-3) */}
      {isScaffolded && (
        <div style={{ background: '#1a1a1a', borderRadius: 12, padding: 16, marginBottom: 16, border: '1px solid #333' }}>
          {stanza.map((line, i) => (
            <div key={i} style={{ color: '#fff', fontSize: 15, lineHeight: 1.6, marginBottom: 2 }}>{line}</div>
          ))}
        </div>
      )}

      {/* Round 4: blank card */}
      {!isScaffolded && phase === "ready" && (
        <div style={{ background: '#1a1a1a', borderRadius: 12, padding: 32, marginBottom: 16, border: '1px solid #ef4444', textAlign: 'center' }}>
          <div style={{ color: '#666', fontSize: 14 }}>Recite stanza {stanzaIdx + 1} from memory</div>
        </div>
      )}

      {/* Controls for rounds 1-3 */}
      {isScaffolded && phase === "ready" && (
        <button onClick={speakStanza} style={{ width: '100%', padding: 12, borderRadius: 8, border: '1px solid #C4911F', background: 'none', color: '#C4911F', fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, marginBottom: 8 }}>
          <SpeakerIcon size={18}/> Listen
        </button>
      )}

      {isScaffolded && phase === "playing" && (
        <div style={{ textAlign: 'center', padding: 12, color: '#C4911F', fontSize: 14 }}>
          <span className="mic-pulse">Playing audio...</span>
        </div>
      )}

      {isScaffolded && phase === "spoken" && (
        <div>
          <div style={{ textAlign: 'center', color: '#999', fontSize: 13, marginBottom: 12 }}>Now repeat this stanza aloud, then tap Next.</div>
          <button onClick={advanceRound} className="bg-gold" style={{ width: '100%', padding: 12, borderRadius: 8, border: 'none', fontWeight: 700, cursor: 'pointer', color: '#000' }}>
            {round < 3 ? `Next Round (${round + 1}/4)` : "Final Round — From Memory"}
          </button>
        </div>
      )}

      {/* Controls for round 4 */}
      {!isScaffolded && phase === "ready" && (
        <button onClick={startReciting} disabled={!sr.supported} className="bg-gold" style={{ width: '100%', padding: 12, borderRadius: 8, border: 'none', fontWeight: 700, cursor: 'pointer', color: '#000', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
          <MicIcon size={18}/> Start Reciting
        </button>
      )}

      {!isScaffolded && phase === "reciting" && (
        <div>
          <div className="mic-pulse" style={{ textAlign: 'center', color: '#ef4444', fontSize: 14, fontWeight: 600, marginBottom: 8 }}>Listening...</div>
          <div style={{ color: '#ccc', fontSize: 13, textAlign: 'center', marginBottom: 12, minHeight: 40 }}>{sr.transcript || "Speak now..."}</div>
          <button onClick={stopReciting} style={{ width: '100%', padding: 12, borderRadius: 8, border: 'none', background: '#ef4444', color: '#fff', fontWeight: 700, cursor: 'pointer' }}>
            Stop &amp; Score
          </button>
        </div>
      )}

      {!isScaffolded && phase === "scoring" && (
        <div style={{ textAlign: 'center', color: '#C4911F', padding: 16 }}>Scoring...</div>
      )}

      {!isScaffolded && phase === "scored" && result && (
        <div>
          <div style={{ background: result.pct >= 70 ? '#166534' : result.pct >= 40 ? '#854d0e' : '#7f1d1d', borderRadius: 12, padding: 16, textAlign: 'center', marginBottom: 12 }}>
            <div style={{ color: '#fff', fontSize: 28, fontWeight: 800 }}>{result.pct}%</div>
            <div style={{ color: '#ccc', fontSize: 12 }}>{result.matched}/{result.total} words</div>
          </div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, marginBottom: 12 }}>
            {result.result.map((r, i) => (
              <span key={i} style={{ fontSize: 13, padding: '2px 4px', borderRadius: 4, background: r.match ? '#166534' : '#7f1d1d', color: r.match ? '#22c55e' : '#ef4444' }}>{r.word}</span>
            ))}
          </div>
          <button onClick={advanceRound} className="bg-gold" style={{ width: '100%', padding: 12, borderRadius: 8, border: 'none', fontWeight: 700, cursor: 'pointer', color: '#000' }}>
            {stanzaIdx + 1 < totalStanzas ? "Next Stanza" : "See Results"}
          </button>
        </div>
      )}
    </div>
  );
}

function LineByLine({ poem, dispatch }) {
  const allLines = poem.stanzas.flat();
  const [revealed, setRevealed] = useState(0);
  const done = revealed >= allLines.length;

  return (
    <div>
      <div style={{ color: '#C4911F', fontSize: 18, fontWeight: 700, textAlign: 'center', marginBottom: 16 }}>{poem.title}</div>
      {allLines.slice(0, revealed).map((line, i) => <div key={i} style={{ color: '#fff', fontSize: 14, marginBottom: 4, lineHeight: 1.5 }}>{line}</div>)}
      {!done ? (
        <button onClick={() => setRevealed(r => r + 1)} className="bg-gold" style={{ width: '100%', padding: 12, borderRadius: 8, border: 'none', fontWeight: 700, cursor: 'pointer', marginTop: 16, color: '#000' }}>
          Reveal Next Line ({revealed}/{allLines.length})
        </button>
      ) : (
        <button onClick={() => dispatch({ type: "MARK_POEM_DONE", poem: poem.title, mode: 1 })} style={{ width: '100%', padding: 12, borderRadius: 8, border: '1px solid #22c55e', background: 'none', color: '#22c55e', fontWeight: 600, cursor: 'pointer', marginTop: 16 }}>
          Mark Complete
        </button>
      )}
    </div>
  );
}

function Recitation({ poem, dispatch }) {
  const [stanzaIdx, setStanzaIdx] = useState(0);
  const done = stanzaIdx >= poem.stanzas.length;

  return (
    <div>
      <div style={{ color: '#C4911F', fontSize: 18, fontWeight: 700, textAlign: 'center', marginBottom: 16 }}>{poem.title}</div>
      <div style={{ color: '#999', fontSize: 13, textAlign: 'center', marginBottom: 12 }}>Recite from memory, then reveal each stanza to check.</div>
      {poem.stanzas.slice(0, stanzaIdx).map((st, si) => (
        <div key={si} style={{ marginBottom: 16, padding: 12, background: '#1a1a1a', borderRadius: 8 }}>
          {st.map((line, li) => <div key={li} style={{ color: '#fff', fontSize: 14, lineHeight: 1.5 }}>{line}</div>)}
        </div>
      ))}
      {!done ? (
        <button onClick={() => setStanzaIdx(s => s + 1)} className="bg-gold" style={{ width: '100%', padding: 12, borderRadius: 8, border: 'none', fontWeight: 700, cursor: 'pointer', color: '#000' }}>
          Reveal Stanza {stanzaIdx + 1} of {poem.stanzas.length}
        </button>
      ) : (
        <button onClick={() => dispatch({ type: "MARK_POEM_DONE", poem: poem.title, mode: 2 })} style={{ width: '100%', padding: 12, borderRadius: 8, border: '1px solid #22c55e', background: 'none', color: '#22c55e', fontWeight: 600, cursor: 'pointer', marginTop: 8 }}>
          Mark Complete
        </button>
      )}
    </div>
  );
}

function OralRecitation({ poem, dispatch }) {
  const sr = useSpeechRecognition();
  const [phase, setPhase] = useState("idle");
  const [compResult, setCompResult] = useState(null);
  const fullText = poem.stanzas.flat().join(' ');

  const handleListen = () => {
    setPhase("listening");
    playAudio(poem.audioFile, fullText).then(() => setPhase("idle")).catch(() => setPhase("idle"));
  };

  const handleStart = () => {
    setPhase("reciting");
    setCompResult(null);
    sr.reset();
    sr.start();
  };

  const handleStop = () => {
    sr.stop();
    setPhase("done");
    setTimeout(() => {
      const res = compareWords(fullText, sr.transcript);
      setCompResult(res);
      if (res.pct >= 60) dispatch({ type: "MARK_POEM_DONE", poem: poem.title, mode: 3 });
    }, 800);
  };

  return (
    <div>
      <div style={{ color: '#C4911F', fontSize: 18, fontWeight: 700, textAlign: 'center', marginBottom: 16 }}>{poem.title}</div>
      {!sr.supported && <div style={{ color: '#ef4444', textAlign: 'center', marginBottom: 12 }}>Speech recognition not supported in this browser.</div>}
      <div style={{ display: 'flex', gap: 12, marginBottom: 16 }}>
        <button onClick={handleListen} disabled={phase === "reciting"} style={{ flex: 1, padding: 12, borderRadius: 8, border: '1px solid #C4911F', background: 'none', color: '#C4911F', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
          <SpeakerIcon size={18}/> Listen First
        </button>
        {phase !== "reciting" ? (
          <button onClick={handleStart} disabled={!sr.supported} className="bg-gold" style={{ flex: 1, padding: 12, borderRadius: 8, border: 'none', color: '#000', fontWeight: 700, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
            <MicIcon size={18}/> Start Reciting
          </button>
        ) : (
          <button onClick={handleStop} style={{ flex: 1, padding: 12, borderRadius: 8, border: 'none', background: '#ef4444', color: '#fff', fontWeight: 700, cursor: 'pointer' }}>
            Stop
          </button>
        )}
      </div>
      {phase === "reciting" && (
        <div style={{ textAlign: 'center', marginBottom: 12 }}>
          <div className="mic-pulse" style={{ color: '#ef4444', fontSize: 14, fontWeight: 600 }}>Recording...</div>
          <div style={{ color: '#ccc', fontSize: 13, marginTop: 8 }}>{sr.transcript || "Speak now..."}</div>
        </div>
      )}
      {compResult && (
        <div style={{ background: '#1a1a1a', borderRadius: 8, padding: 16 }}>
          <div style={{ color: compResult.pct >= 60 ? '#22c55e' : '#ef4444', fontSize: 20, fontWeight: 700, textAlign: 'center', marginBottom: 12 }}>
            {compResult.pct}% Accuracy ({compResult.matched}/{compResult.total} words)
          </div>
          <div style={{ lineHeight: 1.8 }}>
            {compResult.result.map((r, i) => (
              <span key={i} style={{ color: r.match ? '#22c55e' : '#ef4444', fontSize: 14 }}>{r.word} </span>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function RecordReview({ poem, dispatch }) {
  const ar = useAudioRecorder();
  const [showText, setShowText] = useState(false);
  const fullText = poem.stanzas.flat();

  return (
    <div>
      <div style={{ color: '#C4911F', fontSize: 18, fontWeight: 700, textAlign: 'center', marginBottom: 16 }}>{poem.title}</div>
      {!ar.supported && <div style={{ color: '#ef4444', textAlign: 'center', marginBottom: 12 }}>Audio recording not supported.</div>}
      <div style={{ display: 'flex', gap: 12, marginBottom: 16 }}>
        {!ar.recording ? (
          <button onClick={ar.startRec} disabled={!ar.supported} className="bg-gold" style={{ flex: 1, padding: 12, borderRadius: 8, border: 'none', color: '#000', fontWeight: 700, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
            <MicIcon size={18}/> Record
          </button>
        ) : (
          <button onClick={ar.stopRec} style={{ flex: 1, padding: 12, borderRadius: 8, border: 'none', background: '#ef4444', color: '#fff', fontWeight: 700, cursor: 'pointer' }}>
            Stop Recording
          </button>
        )}
      </div>
      {ar.recording && <div className="mic-pulse" style={{ textAlign: 'center', color: '#ef4444', fontWeight: 600, marginBottom: 12 }}>Recording...</div>}
      {ar.audioURL && (
        <div style={{ marginBottom: 16 }}>
          <audio controls src={ar.audioURL} style={{ width: '100%' }}/>
          <button onClick={ar.clearRec} style={{ marginTop: 8, padding: 8, borderRadius: 6, border: '1px solid #555', background: 'none', color: '#999', cursor: 'pointer', fontSize: 13, width: '100%' }}>Clear Recording</button>
        </div>
      )}
      <button onClick={() => setShowText(!showText)} style={{ width: '100%', padding: 10, borderRadius: 8, border: '1px solid #C4911F', background: 'none', color: '#C4911F', cursor: 'pointer', marginBottom: 12 }}>
        {showText ? "Hide" : "Show"} Text for Comparison
      </button>
      {showText && (
        <div style={{ background: '#1a1a1a', borderRadius: 8, padding: 12, marginBottom: 12 }}>
          {fullText.map((l, i) => <div key={i} style={{ color: '#fff', fontSize: 14, lineHeight: 1.5 }}>{l}</div>)}
        </div>
      )}
      <button onClick={() => dispatch({ type: "MARK_POEM_DONE", poem: poem.title, mode: 4 })} style={{ width: '100%', padding: 12, borderRadius: 8, border: '1px solid #22c55e', background: 'none', color: '#22c55e', fontWeight: 600, cursor: 'pointer' }}>
        Mark Complete
      </button>
    </div>
  );
}

// ─── POEMS TAB ─────────────────────────────────────────────────────────────
function PoemsTab({ state, dispatch }) {
  const { selectedPoem, poemMode, poemProgress } = state;

  if (selectedPoem !== null && poemMode !== null) {
    const poem = POEMS[selectedPoem];
    const modeComponents = [GuidedRecitation, LineByLine, Recitation, OralRecitation, RecordReview];
    const ModeComp = modeComponents[poemMode];
    return (
      <div style={{ padding: 16 }}>
        <button onClick={() => dispatch({ type: "BACK_POEM_MODES" })} style={{ background: 'none', border: 'none', color: '#C4911F', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4, marginBottom: 12 }}><BackArrow/> Back to Modes</button>
        <ModeComp poem={poem} dispatch={dispatch} />
      </div>
    );
  }

  if (selectedPoem !== null) {
    const poem = POEMS[selectedPoem];
    const [playing, setPlaying] = useState(false);

    const handlePlayPoem = () => {
      if (playing) return;
      setPlaying(true);
      const fullText = poem.stanzas.flat().join('. ');
      playAudio(poem.audioFile, fullText).finally(() => setPlaying(false));
    };

    return (
      <div style={{ padding: 16 }}>
        <button onClick={() => dispatch({ type: "BACK_POEMS" })} style={{ background: 'none', border: 'none', color: '#C4911F', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4, marginBottom: 12 }}><BackArrow/> All Poems</button>
        <div style={{ textAlign: 'center', marginBottom: 16 }}>
          <div style={{ color: '#C4911F', fontSize: 22, fontWeight: 700 }}>{poem.title}</div>
          <div style={{ color: '#999', fontSize: 14 }}>{poem.author}</div>
          <button onClick={handlePlayPoem} style={{ marginTop: 8, background: 'none', border: '1px solid #C4911F', borderRadius: 20, padding: '6px 16px', color: '#C4911F', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 6 }}>
            <SpeakerIcon size={16}/> {playing ? "Playing..." : "Listen"}
          </button>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {PRACTICE_MODES.map((mode, i) => {
            const done = poemProgress[`${poem.title}_${i}`];
            return (
              <button key={i} onClick={() => dispatch({ type: "SET_POEM_MODE", val: i })} style={{ padding: 14, borderRadius: 8, border: `1px solid ${done ? '#22c55e' : '#333'}`, background: '#1a1a1a', color: '#fff', cursor: 'pointer', textAlign: 'left', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <span style={{ fontSize: 15 }}>{i + 1}. {mode}</span>
                {done && <CheckIcon/>}
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  return (
    <div style={{ padding: 16 }}>
      <div style={{ textAlign: 'center', marginBottom: 16 }}>
        <div style={{ color: '#C4911F', fontSize: 20, fontWeight: 700 }}>Poems</div>
        <div style={{ color: '#999', fontSize: 13 }}>Select a poem to practice</div>
      </div>
      {POEMS.map((poem, i) => {
        const completedModes = PRACTICE_MODES.filter((_, mi) => poemProgress[`${poem.title}_${mi}`]).length;
        return (
          <button key={i} onClick={() => dispatch({ type: "SELECT_POEM", val: i })} style={{ width: '100%', padding: 16, borderRadius: 10, border: '1px solid #333', background: '#1a1a1a', color: '#fff', cursor: 'pointer', textAlign: 'left', marginBottom: 10, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <div style={{ fontSize: 16, fontWeight: 600, color: '#C4911F' }}>{poem.title}</div>
              <div style={{ fontSize: 13, color: '#999' }}>{poem.author}</div>
            </div>
            <div style={{ fontSize: 12, color: '#666' }}>{completedModes}/{PRACTICE_MODES.length}</div>
          </button>
        );
      })}
    </div>
  );
}

// ─── PROGRESS TAB ──────────────────────────────────────────────────────────
function ProgressTab({ state }) {
  const { quizScores, poemProgress } = state;
  const catKeys = Object.keys(CATEGORIES);

  return (
    <div style={{ padding: 16 }}>
      <div style={{ textAlign: 'center', marginBottom: 16 }}>
        <div style={{ color: '#C4911F', fontSize: 20, fontWeight: 700 }}>Progress</div>
      </div>
      <div style={{ marginBottom: 24 }}>
        <div style={{ color: '#fff', fontSize: 16, fontWeight: 600, marginBottom: 12 }}>Quiz Accuracy</div>
        {catKeys.map(cat => {
          const s = quizScores[cat];
          const pct = s ? Math.round((s.correct / s.total) * 100) : 0;
          const total = s ? s.total : 0;
          const barColor = pct >= 80 ? '#22c55e' : pct >= 50 ? '#eab308' : '#ef4444';
          return (
            <div key={cat} style={{ marginBottom: 12 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                <span style={{ color: '#ccc', fontSize: 13 }}>{cat}</span>
                <span style={{ color: '#999', fontSize: 12 }}>{total > 0 ? `${pct}% (${s.correct}/${s.total})` : 'No attempts'}</span>
              </div>
              <div className="progress-bar-outer">
                <div className="progress-bar-inner" style={{ width: `${pct}%`, background: barColor }}></div>
              </div>
            </div>
          );
        })}
      </div>
      <div>
        <div style={{ color: '#fff', fontSize: 16, fontWeight: 600, marginBottom: 12 }}>Poem Practice</div>
        {POEMS.map((poem, pi) => (
          <div key={pi} style={{ marginBottom: 16, background: '#1a1a1a', borderRadius: 10, padding: 12 }}>
            <div style={{ color: '#C4911F', fontSize: 15, fontWeight: 600, marginBottom: 8 }}>{poem.title}</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 6 }}>
              {PRACTICE_MODES.map((mode, mi) => {
                const done = poemProgress[`${poem.title}_${mi}`];
                return (
                  <div key={mi} style={{ background: '#111', borderRadius: 6, padding: '8px 4px', textAlign: 'center', border: `1px solid ${done ? '#22c55e' : '#333'}` }}>
                    <div style={{ fontSize: 10, color: '#999', marginBottom: 4 }}>{mode}</div>
                    {done ? <CheckIcon/> : <span style={{ color: '#555', fontSize: 12 }}>--</span>}
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── APP ────────────────────────────────────────────────────────────────────
function App() {
  const [state, dispatch] = useReducer(reducer, initState);

  if (state.showWelcome) return <WelcomeScreen dispatch={dispatch}/>;

  const tabs = [
    { label: "Study", icon: <BookIcon/> },
    { label: "Poems", icon: <PenIcon/> },
    { label: "Progress", icon: <ChartIcon/> },
  ];

  return (
    <div style={{ paddingBottom: 64 }}>
      {state.tab === 0 && <StudyTab state={state} dispatch={dispatch}/>}
      {state.tab === 1 && <PoemsTab state={state} dispatch={dispatch}/>}
      {state.tab === 2 && <ProgressTab state={state}/>}
      <div style={{ position: 'fixed', bottom: 0, left: '50%', transform: 'translateX(-50%)', width: '100%', maxWidth: 480, background: '#111', borderTop: '1px solid #222', display: 'flex', zIndex: 100 }}>
        {tabs.map((t, i) => (
          <button key={i} className={`tab-btn ${state.tab === i ? 'active' : ''}`} onClick={() => dispatch({ type: "SET_TAB", val: i })}>
            {t.icon}
            <span style={{ marginTop: 2, fontSize: 11 }}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
